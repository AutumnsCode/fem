<!DOCTYPE html><html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="src/images/favicon-32x32.png"
		/>

		<title>Frontend Mentor | Product preview card component</title>
		<link rel="stylesheet" href="src/style.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
    <main class="main">
			<picture>
				<source
					media="(min-width: 38em)"
					srcset="src/images/image-product-desktop.jpg"
				/>
				<img
					src="src/images/image-product-mobile.jpg"
					alt="Image of Product"
				/>
			</picture>
			<article>
				<p class="nav">Prefume </p>
				<h1>Gabrielle Essence Eau De Parfum</h1>
				<p class="description">
					A floral, solar and voluptuous interpretation composed by Olivier
					Polge, Perfumer-Creator for the House of CHANEL.
				</p>
				<div class="price">
					<p class="new__price">$149.99</p>
					<p class="old__price">$169.99</p>
				</div>
				<button class="btn">
					<img src="src/images/icon-cart.svg" alt="card icon" />
					Add to Card
				</button>
			</article>
		</main>
		<div class="attribution">
			Challenge by
			<a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
				>Frontend Mentor</a
			>. Coded by <a href="https://www.frontendmentor.io/profile/AutumnsCode">Autumns Code</a>.
		</div>
	</body>
</html>
